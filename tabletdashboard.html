<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cockpit</title>
<style>
  :root{
    --bg:#11151c;
    --bg-2:#0c0f15;
    --card:#1a212b;
    --card-2:#161d26;
    --line:rgba(255,255,255,.07);
    --line-strong:rgba(255,255,255,.14);
    --hi:#eef2f6;
    --mid:#9aa7b4;
    --low:#5d6976;
    --accent:#e8b14c;   /* warm instrument amber (signature) */
    --good:#4ec58a;
    --warn:#e8b14c;
    --alert:#e8654e;
    --cool:#5aa9e6;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 85% -10%, rgba(232,177,76,.06), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(90,169,230,.06), transparent 60%),
      var(--bg);
    color:var(--hi);
    font-family:var(--sans);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{
    height:100vh;
    padding:clamp(14px,2.2vh,28px);
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:auto auto auto 1fr;
    grid-template-areas:
      "head   head"
      "budget weather"
      "focus  focus"
      "cal    cal";
    gap:clamp(12px,1.6vh,20px);
  }

  /* ---- header / clock (signature) ---- */
  .head{grid-area:head; display:flex; align-items:flex-end; justify-content:space-between; gap:18px; padding:0 4px;}
  .head .date{display:flex; flex-direction:column; gap:2px;}
  .head .weekday{font-size:clamp(14px,2.4vh,22px); letter-spacing:.22em; text-transform:uppercase; color:var(--accent); font-weight:600;}
  .head .full-date{font-size:clamp(13px,1.9vh,17px); color:var(--mid); letter-spacing:.04em;}
  .clock{
    font-family:var(--mono);
    font-size:clamp(40px,9vh,92px);
    font-weight:600;
    line-height:.9;
    letter-spacing:.01em;
    font-variant-numeric:tabular-nums;
  }
  .clock .sec{color:var(--low); font-size:.45em; vertical-align:.18em; margin-left:.1em;}

  /* ---- cards ---- */
  .card{
    background:linear-gradient(180deg,var(--card),var(--card-2));
    border:1px solid var(--line);
    border-radius:18px;
    padding:clamp(16px,2.4vh,26px);
    position:relative;
    overflow:hidden;
    min-height:0;
  }
  .card .label{
    display:flex; align-items:center; gap:9px;
    font-size:clamp(12px,1.7vh,15px);
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--mid); font-weight:600; margin-bottom:.6em;
  }
  .led{width:9px; height:9px; border-radius:50%; background:var(--low); box-shadow:0 0 0 0 transparent; flex:none;}
  .led.good{background:var(--good); box-shadow:0 0 12px rgba(78,197,138,.7);}
  .led.warn{background:var(--warn); box-shadow:0 0 12px rgba(232,177,76,.7);}
  .led.alert{background:var(--alert); box-shadow:0 0 12px rgba(232,101,78,.8);}
  .led.cool{background:var(--cool); box-shadow:0 0 12px rgba(90,169,230,.7);}

  /* ---- budget ---- */
  .budget{grid-area:budget; display:flex; flex-direction:column;}
  .budget .sub{font-size:clamp(13px,1.8vh,16px); color:var(--low); margin-top:-.3em;}
  .budget .amount{
    font-family:var(--mono); font-weight:600; line-height:1;
    font-size:clamp(38px,8vh,76px);
    margin-top:auto; font-variant-numeric:tabular-nums;
  }
  .amount.good{color:var(--good);} .amount.warn{color:var(--warn);} .amount.alert{color:var(--alert);}
  .budget .bar{height:7px; border-radius:4px; background:rgba(255,255,255,.08); margin-top:14px; overflow:hidden;}
  .budget .bar > i{display:block; height:100%; border-radius:4px; transition:width .5s ease;}

  /* ---- weather ---- */
  .weather{grid-area:weather; display:flex; flex-direction:column;}
  .wx-now{display:flex; align-items:center; gap:clamp(10px,2vw,22px); margin-top:auto;}
  .wx-icon{font-size:clamp(40px,8vh,72px); line-height:1;}
  .wx-temp{font-family:var(--mono); font-weight:600; font-size:clamp(38px,8vh,76px); line-height:1; font-variant-numeric:tabular-nums;}
  .wx-meta{display:flex; flex-direction:column; gap:3px; font-size:clamp(12px,1.7vh,15px); color:var(--mid);}
  .wx-cond{color:var(--hi); font-weight:600; font-size:clamp(14px,2vh,18px); margin-bottom:2px;}
  .wx-chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;}
  .chip{font-size:clamp(11px,1.5vh,13px); padding:5px 10px; border-radius:999px; background:rgba(255,255,255,.06); color:var(--mid); border:1px solid var(--line);}
  .chip.cool{color:var(--cool); border-color:rgba(90,169,230,.35);}
  .chip.alert{color:var(--alert); border-color:rgba(232,101,78,.4); background:rgba(232,101,78,.08);}
  .chip.warn{color:var(--warn); border-color:rgba(232,177,76,.4);}
  .wx-days{display:flex; gap:10px; margin-top:14px;}
  .wx-day{flex:1; text-align:center; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:12px; padding:8px 4px;}
  .wx-day .d{font-size:clamp(10px,1.4vh,12px); color:var(--mid); letter-spacing:.08em; text-transform:uppercase;}
  .wx-day .i{font-size:clamp(18px,3vh,26px); margin:2px 0;}
  .wx-day .t{font-family:var(--mono); font-size:clamp(12px,1.7vh,15px);}
  .wx-day .t .mn{color:var(--low);}

  /* ---- focus (reminder + quote) ---- */
  .focus{grid-area:focus; display:flex; flex-direction:column; justify-content:center; text-align:center; gap:clamp(8px,1.4vh,14px); padding-top:clamp(14px,2.2vh,22px); padding-bottom:clamp(14px,2.2vh,22px);}
  .focus .label{justify-content:center;}
  .reminder{font-size:clamp(26px,5.4vh,52px); font-weight:700; line-height:1.08; letter-spacing:-.01em;}
  .reminder .accent{color:var(--accent);}
  .quote{font-size:clamp(14px,2.1vh,20px); color:var(--mid); font-style:italic; max-width:60ch; margin:0 auto;}

  /* ---- calendar ---- */
  .cal{grid-area:cal; display:grid; grid-template-columns:1fr 1fr; gap:clamp(12px,1.6vh,20px); min-height:0;}
  .col{background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid var(--line); border-radius:18px; padding:clamp(14px,2vh,22px); display:flex; flex-direction:column; min-height:0;}
  .col .chead{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px;}
  .col .ctitle{font-size:clamp(13px,1.9vh,16px); letter-spacing:.18em; text-transform:uppercase; color:var(--mid); font-weight:600;}
  .col.today .ctitle{color:var(--accent);}
  .col .cdate{font-size:clamp(11px,1.5vh,13px); color:var(--low); font-family:var(--mono);}
  .events{display:flex; flex-direction:column; gap:9px; overflow:hidden;}
  .ev{display:flex; align-items:center; gap:12px; padding:9px 11px; border-radius:11px; background:rgba(255,255,255,.04); border:1px solid var(--line);}
  .ev .time{font-family:var(--mono); font-size:clamp(13px,1.9vh,17px); color:var(--accent); min-width:3.2em; font-variant-numeric:tabular-nums;}
  .ev .ttl{font-size:clamp(14px,2vh,18px); color:var(--hi); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ev.past{opacity:.4;}
  .ev.past .time{color:var(--low);}
  .ev.past .ttl{text-decoration:line-through;}
  .empty{color:var(--low); font-size:clamp(14px,2vh,17px); font-style:italic; margin-top:6px;}

  /* ---- gear + offline ---- */
  .gear{position:fixed; top:10px; right:10px; width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,.05); border:1px solid var(--line); color:var(--mid); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:30; opacity:.35; transition:opacity .2s;}
  .gear:hover,.gear:active{opacity:1;}
  .offline{position:fixed; bottom:8px; left:14px; font-size:12px; color:var(--alert); opacity:.8; display:none;}

  /* ---- editor ---- */
  .scrim{position:fixed; inset:0; background:rgba(5,7,10,.7); backdrop-filter:blur(4px); z-index:40; display:none; align-items:center; justify-content:center; padding:20px;}
  .scrim.open{display:flex;}
  .editor{width:min(560px,94vw); max-height:90vh; overflow-y:auto; background:var(--card); border:1px solid var(--line-strong); border-radius:20px; padding:22px;}
  .editor h2{font-size:18px; letter-spacing:.04em; margin-bottom:4px;}
  .editor p.hint{font-size:13px; color:var(--mid); margin-bottom:18px;}
  .fset{border-top:1px solid var(--line); padding:16px 0;}
  .fset > h3{font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:12px;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}
  .fld{display:flex; flex-direction:column; gap:5px; flex:1; min-width:120px;}
  .fld label{font-size:12px; color:var(--mid);}
  input,select{background:var(--bg-2); border:1px solid var(--line-strong); border-radius:10px; color:var(--hi); padding:11px 12px; font-size:16px; font-family:var(--sans); width:100%;}
  input:focus,select:focus{outline:none; border-color:var(--accent);}
  .btn{border:none; border-radius:10px; padding:11px 16px; font-size:15px; font-weight:600; cursor:pointer; font-family:var(--sans);}
  .btn.primary{background:var(--accent); color:#21180a;}
  .btn.ghost{background:rgba(255,255,255,.06); color:var(--hi); border:1px solid var(--line-strong);}
  .btn.mini{padding:9px 12px; font-size:14px;}
  .btn.danger{background:rgba(232,101,78,.15); color:var(--alert); border:1px solid rgba(232,101,78,.4);}
  .evlist{display:flex; flex-direction:column; gap:8px; margin-bottom:12px;}
  .evrow{display:flex; align-items:center; gap:10px; background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px;}
  .evrow .ed{font-family:var(--mono); color:var(--accent); min-width:8.5em; font-size:13px;}
  .evrow .et{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .foot{display:flex; gap:10px; justify-content:flex-end; padding-top:18px; border-top:1px solid var(--line); margin-top:4px;}
  .fadein{animation:fade .6s ease both;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){.fadein{animation:none;}}
</style>
</head>
<body>
<div class="gear" id="gear" title="Bearbeiten">⚙</div>
<div class="offline" id="offline">Wetter offline</div>

<div class="wrap fadein">
  <header class="head">
    <div class="date">
      <span class="weekday" id="weekday">—</span>
      <span class="full-date" id="fulldate">—</span>
    </div>
    <div class="clock" id="clock">--:--<span class="sec">--</span></div>
  </header>

  <section class="card budget">
    <div class="label"><span class="led" id="budgetLed"></span><span id="budgetLabel">Budget</span></div>
    <div class="sub" id="budgetSub">verfügbar</div>
    <div class="amount" id="budgetAmount">–</div>
    <div class="bar"><i id="budgetBar"></i></div>
  </section>

  <section class="card weather">
    <div class="label"><span class="led cool" id="wxLed"></span><span id="wxCity">Wetter</span></div>
    <div class="wx-now">
      <div class="wx-icon" id="wxIcon">·</div>
      <div class="wx-temp" id="wxTemp">–°</div>
      <div class="wx-meta">
        <span class="wx-cond" id="wxCond">lädt …</span>
        <span id="wxFeels"></span>
        <span id="wxRange"></span>
      </div>
    </div>
    <div class="wx-chips" id="wxChips"></div>
    <div class="wx-days" id="wxDays"></div>
  </section>

  <section class="card focus">
    <div class="label"><span class="led warn"></span>Fokus heute</div>
    <div class="reminder" id="reminder">—</div>
    <div class="quote" id="quote">—</div>
  </section>

  <div class="cal">
    <div class="col today">
      <div class="chead"><span class="ctitle">Heute</span><span class="cdate" id="todayDate"></span></div>
      <div class="events" id="todayEvents"></div>
    </div>
    <div class="col">
      <div class="chead"><span class="ctitle">Morgen</span><span class="cdate" id="tomDate"></span></div>
      <div class="events" id="tomEvents"></div>
    </div>
  </div>
</div>

<!-- Editor -->
<div class="scrim" id="scrim">
  <div class="editor">
    <h2>Dashboard bearbeiten</h2>
    <p class="hint">Änderungen werden lokal auf diesem Gerät gespeichert.</p>

    <div class="fset">
      <h3>Wetter-Ort</h3>
      <div class="row">
        <div class="fld"><label>Stadt (Anzeige)</label><input id="e_city"></div>
        <div class="fld"><label>Breite (lat)</label><input id="e_lat" inputmode="decimal"></div>
        <div class="fld"><label>Länge (lon)</label><input id="e_lon" inputmode="decimal"></div>
      </div>
    </div>

    <div class="fset">
      <h3>Budget / Finanzen</h3>
      <div class="row">
        <div class="fld"><label>Titel</label><input id="e_bLabel"></div>
        <div class="fld"><label>Unterzeile</label><input id="e_bSub"></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <div class="fld"><label>Wert (€)</label><input id="e_bVal" inputmode="decimal"></div>
        <div class="fld"><label>Warnschwelle (€)</label><input id="e_bThr" inputmode="decimal"></div>
      </div>
    </div>

    <div class="fset">
      <h3>Fokus & Spruch</h3>
      <div class="fld"><label>Reminder / Fokus heute</label><input id="e_rem"></div>
      <div class="fld" style="margin-top:10px;"><label>Eigener Spruch (leer = tägliches Sprichwort)</label><input id="e_quote"></div>
    </div>

    <div class="fset">
      <h3>Termine</h3>
      <div class="evlist" id="e_evlist"></div>
      <div class="row">
        <div class="fld" style="flex:0 0 auto;"><label>Datum</label><input type="date" id="e_evDate"></div>
        <div class="fld" style="flex:0 0 auto;"><label>Zeit</label><input type="time" id="e_evTime"></div>
        <div class="fld"><label>Titel</label><input id="e_evTitle" placeholder="z. B. Stream-Vorbereitung"></div>
        <button class="btn primary mini" id="e_evAdd">Hinzufügen</button>
      </div>
    </div>

    <div class="foot">
      <button class="btn ghost" id="e_close">Schließen</button>
      <button class="btn primary" id="e_save">Speichern</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ---------- storage (robust: localStorage with in-memory fallback) ---------- */
var mem = {};
function load(){
  try{ var s = localStorage.getItem("cockpit"); if(s) return JSON.parse(s); }catch(e){}
  try{ if(mem.cockpit) return JSON.parse(mem.cockpit); }catch(e){}
  return null;
}
function save(){
  var s = JSON.stringify(state);
  try{ localStorage.setItem("cockpit", s); }catch(e){ mem.cockpit = s; }
}

var DEFAULTS = {
  city:"Essen", lat:51.4556, lon:7.0116,
  bLabel:"Budget", bSub:"diesen Monat", bVal:450, bThr:100,
  reminder:"Heute: ein Schritt im Rig-Workflow",
  quote:"",
  events:[]
};
var state = Object.assign({}, DEFAULTS, load() || {});

/* ---------- proverbs (public domain) ---------- */
var PROVERBS = [
  "Wer rastet, der rostet.",
  "Übung macht den Meister.",
  "Der frühe Vogel fängt den Wurm.",
  "Ohne Fleiß kein Preis.",
  "Steter Tropfen höhlt den Stein.",
  "Aller Anfang ist schwer.",
  "Was du heute kannst besorgen, das verschiebe nicht auf morgen.",
  "Geduld bringt Rosen.",
  "Morgenstund hat Gold im Mund.",
  "Wer A sagt, muss auch B sagen.",
  "Gut Ding will Weile haben.",
  "Viele Wege führen nach Rom."
];

/* ---------- date helpers ---------- */
var WD = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
var MO = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
function pad(n){ return (n<10?"0":"")+n; }
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function dayOfYear(d){ var s=new Date(d.getFullYear(),0,0); return Math.floor((d-s)/86400000); }

/* ---------- clock ---------- */
function renderClock(){
  var d = new Date();
  document.getElementById("weekday").textContent = WD[d.getDay()];
  document.getElementById("fulldate").textContent = d.getDate()+". "+MO[d.getMonth()]+" "+d.getFullYear();
  document.getElementById("clock").innerHTML =
    pad(d.getHours())+":"+pad(d.getMinutes())+'<span class="sec">'+pad(d.getSeconds())+'</span>';
}

/* ---------- budget ---------- */
function fmtEur(v){
  try{ return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(v); }
  catch(e){ return "€"+Math.round(v); }
}
function renderBudget(){
  document.getElementById("budgetLabel").textContent = state.bLabel || "Budget";
  document.getElementById("budgetSub").textContent = state.bSub || "";
  var v = Number(state.bVal)||0, thr = Number(state.bThr)||0;
  var amt = document.getElementById("budgetAmount");
  amt.textContent = fmtEur(v);
  var led = document.getElementById("budgetLed"), bar = document.getElementById("budgetBar");
  var cls = v<=0 ? "alert" : (v<thr ? "warn" : "good");
  amt.className = "amount "+cls;
  led.className = "led "+cls;
  var col = cls==="good"?"var(--good)":cls==="warn"?"var(--warn)":"var(--alert)";
  var pct = thr>0 ? Math.max(6, Math.min(100, (v/(thr*4))*100)) : 60;
  bar.style.width = pct+"%"; bar.style.background = col;
}

/* ---------- reminder + quote ---------- */
function renderFocus(){
  document.getElementById("reminder").textContent = state.reminder || "—";
  var q = state.quote && state.quote.trim() ? state.quote.trim()
        : PROVERBS[ dayOfYear(new Date()) % PROVERBS.length ];
  document.getElementById("quote").textContent = "„"+q+"“";
}

/* ---------- calendar ---------- */
function renderCalendar(){
  var now = new Date();
  var today = ymd(now);
  var tmrwD = new Date(now.getTime()+86400000), tmrw = ymd(tmrwD);
  document.getElementById("todayDate").textContent = pad(now.getDate())+"."+pad(now.getMonth()+1)+".";
  document.getElementById("tomDate").textContent = pad(tmrwD.getDate())+"."+pad(tmrwD.getMonth()+1)+".";
  var nowMin = now.getHours()*60+now.getMinutes();

  function build(targetId, dateStr, dimPast){
    var box = document.getElementById(targetId); box.innerHTML="";
    var list = (state.events||[]).filter(function(e){return e.date===dateStr;})
                .sort(function(a,b){return (a.time||"").localeCompare(b.time||"");});
    if(!list.length){
      var em = document.createElement("div"); em.className="empty";
      em.textContent = dimPast ? "Nichts geplant — frei für Fokusarbeit." : "Noch nichts geplant.";
      box.appendChild(em); return;
    }
    list.forEach(function(e){
      var row = document.createElement("div"); row.className="ev";
      if(dimPast && e.time){ var m=parseInt(e.time.slice(0,2),10)*60+parseInt(e.time.slice(3,5),10); if(m<nowMin) row.className+=" past"; }
      var t=document.createElement("span"); t.className="time"; t.textContent=e.time||"—";
      var ti=document.createElement("span"); ti.className="ttl"; ti.textContent=e.title||"";
      row.appendChild(t); row.appendChild(ti); box.appendChild(row);
    });
  }
  build("todayEvents", today, true);
  build("tomEvents", tmrw, false);
}

/* ---------- weather (Open-Meteo, no key) ---------- */
var WMO = {
  0:["☀️","Klar"],1:["🌤️","Heiter"],2:["⛅","Wolkig"],3:["☁️","Bedeckt"],
  45:["🌫️","Nebel"],48:["🌫️","Reifnebel"],
  51:["🌦️","Niesel"],53:["🌦️","Niesel"],55:["🌦️","Niesel"],
  61:["🌧️","Regen"],63:["🌧️","Regen"],65:["🌧️","Starkregen"],
  66:["🌧️","Eisregen"],67:["🌧️","Eisregen"],
  71:["🌨️","Schnee"],73:["🌨️","Schnee"],75:["❄️","Starker Schnee"],77:["🌨️","Schneegriesel"],
  80:["🌦️","Schauer"],81:["🌦️","Schauer"],82:["⛈️","Heftige Schauer"],
  85:["🌨️","Schneeschauer"],86:["🌨️","Schneeschauer"],
  95:["⛈️","Gewitter"],96:["⛈️","Gewitter"],99:["⛈️","Schweres Gewitter"]
};
function wmo(c){ return WMO[c] || ["🌡️","—"]; }
function tempColor(t){
  if(t<0) return "#7cc0ff"; if(t<5) return "var(--cool)"; if(t<12) return "#4fb6c5";
  if(t<20) return "var(--good)"; if(t<27) return "var(--warn)"; return "var(--alert)";
}
function renderWeather(data){
  document.getElementById("offline").style.display="none";
  var c = data.current, dly = data.daily;
  var ww = wmo(c.weather_code);
  document.getElementById("wxIcon").textContent = ww[0];
  document.getElementById("wxCond").textContent = ww[1];
  var t = Math.round(c.temperature_2m);
  var tEl = document.getElementById("wxTemp"); tEl.textContent = t+"°"; tEl.style.color = tempColor(t);
  document.getElementById("wxFeels").textContent = "gefühlt "+Math.round(c.apparent_temperature)+"°  ·  💧 "+Math.round(c.relative_humidity_2m)+"%";
  var hi = Math.round(dly.temperature_2m_max[0]), lo = Math.round(dly.temperature_2m_min[0]);
  document.getElementById("wxRange").textContent = "heute "+hi+"° / "+lo+"°";

  // chips: frost / rain / wind
  var chips = document.getElementById("wxChips"); chips.innerHTML="";
  function chip(txt,cls){ var s=document.createElement("span"); s.className="chip"+(cls?" "+cls:""); s.textContent=txt; chips.appendChild(s); }
  if(lo<=3) chip("❄️ Frostgefahr ("+lo+"°)","alert");
  var pp = dly.precipitation_probability_max ? dly.precipitation_probability_max[0] : null;
  if(pp!=null && pp>=60) chip("☔ Regen "+pp+"%","warn");
  else if(pp!=null) chip("Regen "+pp+"%","cool");
  chip("🌬️ "+Math.round(c.wind_speed_10m)+" km/h");

  // 3-day forecast (skip index 0 = today, show next two)
  var days = document.getElementById("wxDays"); days.innerHTML="";
  var names = ["heute","morgen","übermorgen"];
  for(var i=1;i<Math.min(3,dly.time.length);i++){
    var w=wmo(dly.weather_code[i]);
    var el=document.createElement("div"); el.className="wx-day";
    el.innerHTML='<div class="d">'+names[i]+'</div><div class="i">'+w[0]+'</div>'+
      '<div class="t">'+Math.round(dly.temperature_2m_max[i])+'°<span class="mn"> / '+Math.round(dly.temperature_2m_min[i])+'°</span></div>';
    days.appendChild(el);
  }
  document.getElementById("wxCity").textContent = state.city || "Wetter";
}
function fetchWeather(){
  var url = "https://api.open-meteo.com/v1/forecast?latitude="+state.lat+"&longitude="+state.lon+
    "&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m"+
    "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max"+
    "&timezone=auto&forecast_days=3";
  fetch(url).then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(renderWeather)
    .catch(function(){
      document.getElementById("wxCond").textContent = "nicht verfügbar";
      document.getElementById("offline").style.display="block";
    });
}

/* ---------- editor ---------- */
function openEditor(){
  document.getElementById("e_city").value = state.city;
  document.getElementById("e_lat").value = state.lat;
  document.getElementById("e_lon").value = state.lon;
  document.getElementById("e_bLabel").value = state.bLabel;
  document.getElementById("e_bSub").value = state.bSub;
  document.getElementById("e_bVal").value = state.bVal;
  document.getElementById("e_bThr").value = state.bThr;
  document.getElementById("e_rem").value = state.reminder;
  document.getElementById("e_quote").value = state.quote;
  renderEvList();
  document.getElementById("scrim").classList.add("open");
}
function closeEditor(){ document.getElementById("scrim").classList.remove("open"); }
function renderEvList(){
  var box=document.getElementById("e_evlist"); box.innerHTML="";
  var list=(state.events||[]).slice().sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
  if(!list.length){ box.innerHTML='<div class="empty" style="font-size:13px;">Keine Termine.</div>'; return; }
  list.forEach(function(e){
    var row=document.createElement("div"); row.className="evrow";
    var d=document.createElement("span"); d.className="ed";
    d.textContent=(e.date||"")+" "+(e.time||"");
    var t=document.createElement("span"); t.className="et"; t.textContent=e.title||"";
    var del=document.createElement("button"); del.className="btn danger mini"; del.textContent="✕";
    del.onclick=function(){ state.events=state.events.filter(function(x){return x!==e;}); renderEvList(); };
    row.appendChild(d); row.appendChild(t); row.appendChild(del); box.appendChild(row);
  });
}
function saveEditor(){
  state.city=document.getElementById("e_city").value.trim()||"Essen";
  state.lat=parseFloat(document.getElementById("e_lat").value)||state.lat;
  state.lon=parseFloat(document.getElementById("e_lon").value)||state.lon;
  state.bLabel=document.getElementById("e_bLabel").value.trim()||"Budget";
  state.bSub=document.getElementById("e_bSub").value.trim();
  state.bVal=parseFloat(document.getElementById("e_bVal").value)||0;
  state.bThr=parseFloat(document.getElementById("e_bThr").value)||0;
  state.reminder=document.getElementById("e_rem").value.trim();
  state.quote=document.getElementById("e_quote").value.trim();
  save();
  renderAll(); fetchWeather();
  closeEditor();
}
function addEvent(){
  var d=document.getElementById("e_evDate").value;
  var t=document.getElementById("e_evTime").value;
  var ti=document.getElementById("e_evTitle").value.trim();
  if(!d || !ti){ return; }
  state.events.push({date:d,time:t||"",title:ti});
  document.getElementById("e_evTitle").value="";
  renderEvList();
}

/* ---------- wire up ---------- */
document.getElementById("gear").onclick=openEditor;
document.getElementById("e_close").onclick=closeEditor;
document.getElementById("e_save").onclick=saveEditor;
document.getElementById("e_evAdd").onclick=addEvent;
document.getElementById("scrim").onclick=function(e){ if(e.target===this) closeEditor(); };

function renderAll(){ renderClock(); renderBudget(); renderFocus(); renderCalendar(); }

renderAll();
fetchWeather();
setInterval(renderClock, 1000);
setInterval(function(){ renderCalendar(); renderFocus(); }, 60000); // refresh dimming + daily quote at midnight
setInterval(fetchWeather, 30*60*1000); // weather every 30 min
</script>
</body>
</html>
