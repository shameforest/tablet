<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lebensbereiche</title>
<style>
  :root{
    --bg:#11151c; --bg-2:#0c0f15; --card:#1a212b; --card-2:#161d26;
    --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.14);
    --hi:#eef2f6; --mid:#9aa7b4; --low:#5d6976;
    --amber:#e8b14c; --green:#4ec58a; --blue:#5aa9e6; --purple:#b18be0; --red:#e8654e;
    --mono: ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 85% -10%, rgba(232,177,76,.05), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(90,169,230,.05), transparent 60%),
      var(--bg);
    color:var(--hi); font-family:var(--sans); overflow:hidden;
    -webkit-font-smoothing:antialiased; user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .screen{height:100vh; padding:clamp(14px,2.4vh,30px); display:none; flex-direction:column; gap:clamp(12px,1.8vh,20px);}
  .screen.active{display:flex;}
  .fadein{animation:fade .35s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.fadein{animation:none;}}

  /* header */
  .head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px;}
  .head .wd{font-size:clamp(14px,2.4vh,22px); letter-spacing:.22em; text-transform:uppercase; color:var(--amber); font-weight:600;}
  .head .dt{font-size:clamp(12px,1.8vh,16px); color:var(--mid);}
  .clock{font-family:var(--mono); font-size:clamp(34px,7.5vh,72px); font-weight:600; line-height:.9; font-variant-numeric:tabular-nums;}
  .clock .s{color:var(--low); font-size:.45em; vertical-align:.18em; margin-left:.08em;}

  /* compact weather + agenda strip */
  .strip{display:flex; gap:clamp(10px,1.6vh,16px);}
  .wx{flex:0 0 auto; display:flex; align-items:center; gap:12px; background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid var(--line); border-radius:16px; padding:12px 18px;}
  .wx .ic{font-size:clamp(26px,4.6vh,40px);}
  .wx .tp{font-family:var(--mono); font-size:clamp(22px,4vh,36px); font-variant-numeric:tabular-nums;}
  .wx .mt{font-size:clamp(11px,1.5vh,13px); color:var(--mid); display:flex; flex-direction:column; gap:2px;}
  .wx .mt b{color:var(--hi); font-weight:600;}
  .agenda{flex:1; background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid var(--line); border-radius:16px; padding:12px 18px; min-width:0; display:flex; flex-direction:column;}
  .agenda .lab{font-size:clamp(11px,1.5vh,13px); letter-spacing:.16em; text-transform:uppercase; color:var(--amber); font-weight:600; margin-bottom:6px;}
  .agenda .items{display:flex; gap:8px; flex-wrap:wrap; overflow:hidden;}
  .agenda .ev{display:flex; gap:8px; align-items:center; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:9px; padding:5px 10px; font-size:clamp(12px,1.7vh,15px);}
  .agenda .ev .t{font-family:var(--mono); color:var(--amber);}
  .agenda .empty{color:var(--low); font-style:italic; font-size:clamp(12px,1.7vh,15px);}

  /* big buttons grid */
  .grid{flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:clamp(12px,1.8vh,20px); min-height:0;}
  .tile{position:relative; border-radius:22px; padding:clamp(18px,3vh,30px); display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; overflow:hidden; border:1px solid var(--line-2); background:linear-gradient(180deg,var(--card),var(--card-2)); transition:transform .12s ease, filter .12s ease; min-height:0;}
  .tile:active{transform:scale(.985); filter:brightness(1.12);}
  .tile .glow{position:absolute; inset:0; opacity:.16; background:radial-gradient(420px 280px at 80% 120%, var(--accent), transparent 70%); pointer-events:none;}
  .tile .top{display:flex; align-items:center; justify-content:space-between;}
  .tile .icon{font-size:clamp(34px,6vh,54px); line-height:1;}
  .tile .chev{color:var(--low); font-size:clamp(22px,4vh,34px);}
  .tile .title{font-size:clamp(22px,4.2vh,40px); font-weight:700; letter-spacing:-.01em; margin-top:auto;}
  .tile .teaser{font-size:clamp(13px,1.9vh,17px); color:var(--mid); margin-top:6px;}
  .tile .accentbar{height:5px; border-radius:4px; background:var(--accent); margin-top:14px; width:54px;}

  /* area view */
  .abar{display:flex; align-items:center; gap:14px;}
  .back{display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.06); border:1px solid var(--line-2); color:var(--hi); border-radius:14px; padding:12px 20px; font-size:clamp(15px,2.2vh,19px); font-weight:600; cursor:pointer;}
  .back:active{filter:brightness(1.2);}
  .atitle{display:flex; align-items:center; gap:14px; font-size:clamp(22px,4.4vh,40px); font-weight:700;}
  .atitle .ai{font-size:clamp(28px,5vh,46px);}
  .acontent{flex:1; display:grid; gap:clamp(12px,1.8vh,20px); grid-template-columns:1fr; min-height:0; overflow:hidden;}
  .panel{background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid var(--line); border-radius:18px; padding:clamp(16px,2.4vh,26px); min-height:0; display:flex; flex-direction:column;}
  .panel .plab{font-size:clamp(11px,1.6vh,14px); letter-spacing:.16em; text-transform:uppercase; color:var(--mid); font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:9px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}
  .notes{font-size:clamp(15px,2.2vh,20px); line-height:1.5; color:var(--hi); white-space:pre-wrap; overflow-y:auto; flex:1;}
  .notes .muted{color:var(--low); font-style:italic;}
  .bigval{font-family:var(--mono); font-weight:600; font-size:clamp(34px,6.5vh,64px); font-variant-numeric:tabular-nums;}
  .obnote{margin-top:10px; font-size:clamp(11px,1.5vh,13px); color:var(--low);}

  /* gear + editor */
  .gear{position:fixed; top:10px; right:10px; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.06); border:1px solid var(--line); color:var(--mid); font-size:21px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:30; opacity:.4;}
  .gear:active{opacity:1;}
  .offline{position:fixed; bottom:8px; left:14px; font-size:12px; color:var(--red); opacity:.85; display:none;}
  .scrim{position:fixed; inset:0; background:rgba(5,7,10,.72); backdrop-filter:blur(4px); z-index:40; display:none; align-items:center; justify-content:center; padding:18px;}
  .scrim.open{display:flex;}
  .editor{width:min(640px,95vw); max-height:92vh; overflow-y:auto; background:var(--card); border:1px solid var(--line-2); border-radius:20px; padding:22px;}
  .editor h2{font-size:18px; margin-bottom:4px;}
  .editor p.hint{font-size:13px; color:var(--mid); margin-bottom:16px;}
  .fset{border-top:1px solid var(--line); padding:14px 0;}
  .fset h3{font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--amber); margin-bottom:10px;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}
  .fld{display:flex; flex-direction:column; gap:5px; flex:1; min-width:110px;}
  .fld.sm{flex:0 0 90px;}
  label{font-size:12px; color:var(--mid);}
  input,select,textarea{background:var(--bg-2); border:1px solid var(--line-2); border-radius:10px; color:var(--hi); padding:11px 12px; font-size:16px; font-family:var(--sans); width:100%;}
  textarea{min-height:90px; resize:vertical; line-height:1.4;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--amber);}
  .btn{border:none; border-radius:10px; padding:11px 16px; font-size:15px; font-weight:600; cursor:pointer; font-family:var(--sans);}
  .btn.primary{background:var(--amber); color:#21180a;}
  .btn.ghost{background:rgba(255,255,255,.06); color:var(--hi); border:1px solid var(--line-2);}
  .btn.mini{padding:9px 12px; font-size:14px;}
  .btn.danger{background:rgba(232,101,78,.15); color:var(--red); border:1px solid rgba(232,101,78,.4);}
  .evlist{display:flex; flex-direction:column; gap:8px; margin-bottom:12px;}
  .evrow{display:flex; align-items:center; gap:10px; background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:14px;}
  .evrow .ed{font-family:var(--mono); color:var(--amber); min-width:8.5em; font-size:13px;}
  .evrow .et{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tabbar{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
  .tabbar .tb{padding:7px 12px; border-radius:9px; background:var(--bg-2); border:1px solid var(--line); color:var(--mid); font-size:13px; cursor:pointer;}
  .tabbar .tb.on{color:#21180a; background:var(--amber); border-color:var(--amber);}
  .foot{display:flex; gap:10px; justify-content:flex-end; padding-top:16px; border-top:1px solid var(--line); margin-top:4px;}
</style>
</head>
<body>
<div class="gear" id="gear">⚙</div>
<div class="offline" id="offline">Wetter offline</div>

<!-- ============ HUB ============ -->
<div class="screen active" id="hub">
  <div class="head">
    <div><div class="wd" id="wd">—</div><div class="dt" id="dt">—</div></div>
    <div class="clock" id="clock">--:--<span class="s">--</span></div>
  </div>

  <div class="strip">
    <div class="wx">
      <div class="ic" id="wxIc">·</div>
      <div class="tp" id="wxTp">–°</div>
      <div class="mt"><b id="wxCond">lädt …</b><span id="wxSub"></span></div>
    </div>
    <div class="agenda">
      <div class="lab">Heute</div>
      <div class="items" id="agenda"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- ============ AREA ============ -->
<div class="screen" id="area">
  <div class="abar">
    <button class="back" id="back">← Zurück</button>
    <div class="atitle"><span class="ai" id="aIcon">·</span><span id="aTitle">Bereich</span></div>
  </div>
  <div class="acontent" id="aContent"></div>
</div>

<!-- ============ EDITOR ============ -->
<div class="scrim" id="scrim">
  <div class="editor">
    <h2>Bearbeiten</h2>
    <p class="hint">Lokal gespeichert. Später liefert Obsidian die Inhalte automatisch.</p>

    <div class="fset">
      <h3>Wetter-Ort</h3>
      <div class="row">
        <div class="fld"><label>Stadt</label><input id="e_city"></div>
        <div class="fld sm"><label>lat</label><input id="e_lat" inputmode="decimal"></div>
        <div class="fld sm"><label>lon</label><input id="e_lon" inputmode="decimal"></div>
      </div>
    </div>

    <div class="fset">
      <h3>Budget (Bereich Finanzen)</h3>
      <div class="row">
        <div class="fld"><label>Wert (€)</label><input id="e_bVal" inputmode="decimal"></div>
        <div class="fld"><label>Warnschwelle (€)</label><input id="e_bThr" inputmode="decimal"></div>
      </div>
    </div>

    <div class="fset">
      <h3>Lebensbereiche</h3>
      <div class="tabbar" id="areaTabs"></div>
      <div class="row">
        <div class="fld sm"><label>Symbol</label><input id="e_aIcon" maxlength="2"></div>
        <div class="fld"><label>Titel</label><input id="e_aTitle"></div>
        <div class="fld"><label>Kurztext (Kachel)</label><input id="e_aTeaser"></div>
      </div>
      <div class="fld" style="margin-top:10px;"><label>Inhalt / Notizen (später aus Obsidian)</label><textarea id="e_aNotes"></textarea></div>
    </div>

    <div class="fset">
      <h3>Termine (Heute/Hub)</h3>
      <div class="evlist" id="e_evlist"></div>
      <div class="row">
        <div class="fld sm"><label>Datum</label><input type="date" id="e_evDate"></div>
        <div class="fld sm"><label>Zeit</label><input type="time" id="e_evTime"></div>
        <div class="fld"><label>Titel</label><input id="e_evTitle"></div>
        <button class="btn primary mini" id="e_evAdd">+</button>
      </div>
    </div>

    <div class="foot">
      <button class="btn ghost" id="e_close">Schließen</button>
      <button class="btn primary" id="e_save">Speichern</button>
    </div>
  </div>
</div>

<script>
"use strict";
var mem={};
function load(){ try{var s=localStorage.getItem("hub");if(s)return JSON.parse(s);}catch(e){} try{if(mem.hub)return JSON.parse(mem.hub);}catch(e){} return null; }
function save(){ var s=JSON.stringify(state); try{localStorage.setItem("hub",s);}catch(e){mem.hub=s;} }

var DEFAULTS={
  city:"Essen", lat:51.4556, lon:7.0116,
  bVal:450, bThr:100,
  events:[],
  areas:[
    {key:"arbeit",  icon:"🛠️", color:"--amber",  title:"Arbeit & Projekte", teaser:"Nächster Schritt · Render-Status",
     notes:"Aktuelles Projekt: …\nNächster Schritt: …\n\n(Hier später: Render-/Job-Status und deine Projekt-Notizen aus Obsidian.)"},
    {key:"sport",   icon:"💪", color:"--green",  title:"Gesundheit & Sport", teaser:"Sport-Streak · Rücken-Routine",
     notes:"Heute trainiert? …\nRücken-Routine: 7 Übungen\n\n(Hier später: Sport-Heatmap der letzten Wochen aus Obsidian.)"},
    {key:"finanzen",icon:"💶", color:"--blue",   title:"Finanzen", teaser:"Budget · Übersicht",
     notes:"Fixkosten: …\nSparziel: …\n\n(Budget oben; später ggf. bunq-Anbindung – nur ein abgeleiteter Wert, kein roher Kontostand.)"},
    {key:"wissen",  icon:"📚", color:"--purple", title:"Wissen & Recherche", teaser:"Notizen · Begriff des Tages",
     notes:"Aktuell am Lesen: …\nNotiz-Idee: …\n\n(Hier später: deine Recherche-Notizen aus Obsidian.)"}
  ]
};
var state=Object.assign({},DEFAULTS,load()||{});
// safety: ensure 4 areas
if(!Array.isArray(state.areas)||state.areas.length<4) state.areas=DEFAULTS.areas;

var PROVERBS=["Wer rastet, der rostet.","Übung macht den Meister.","Steter Tropfen höhlt den Stein.","Ohne Fleiß kein Preis.","Aller Anfang ist schwer.","Gut Ding will Weile haben.","Der frühe Vogel fängt den Wurm.","Geduld bringt Rosen."];
var WD=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
var MO=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
function pad(n){return(n<10?"0":"")+n;}
function ymd(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function doy(d){var s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000);}

function renderClock(){
  var d=new Date();
  document.getElementById("wd").textContent=WD[d.getDay()];
  document.getElementById("dt").textContent=d.getDate()+". "+MO[d.getMonth()]+" "+d.getFullYear();
  document.getElementById("clock").innerHTML=pad(d.getHours())+":"+pad(d.getMinutes())+'<span class="s">'+pad(d.getSeconds())+'</span>';
}
function renderAgenda(){
  var box=document.getElementById("agenda"); box.innerHTML="";
  var today=ymd(new Date());
  var list=(state.events||[]).filter(function(e){return e.date===today;}).sort(function(a,b){return(a.time||"").localeCompare(b.time||"");});
  if(!list.length){ box.innerHTML='<span class="empty">Nichts geplant — frei für Fokusarbeit.</span>'; return; }
  list.slice(0,6).forEach(function(e){
    var s=document.createElement("span"); s.className="ev";
    s.innerHTML='<span class="t">'+(e.time||"—")+'</span><span>'+escapeHtml(e.title||"")+'</span>'; box.appendChild(s);
  });
}
function escapeHtml(t){return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function renderGrid(){
  var g=document.getElementById("grid"); g.innerHTML="";
  state.areas.forEach(function(a,i){
    var col="var("+a.color+")";
    var t=document.createElement("div"); t.className="tile"; t.style.setProperty("--accent",col);
    t.innerHTML='<div class="glow"></div>'+
      '<div class="top"><span class="icon">'+a.icon+'</span><span class="chev">›</span></div>'+
      '<div><div class="title">'+escapeHtml(a.title)+'</div>'+
      '<div class="teaser">'+escapeHtml(a.teaser||"")+'</div>'+
      '<div class="accentbar"></div></div>';
    t.onclick=function(){ showArea(i); };
    g.appendChild(t);
  });
}

function showHub(){ document.getElementById("area").classList.remove("active"); var h=document.getElementById("hub"); h.classList.add("active","fadein"); setTimeout(function(){h.classList.remove("fadein");},400); }
function showArea(i){
  var a=state.areas[i]; var col="var("+a.color+")";
  document.getElementById("aIcon").textContent=a.icon;
  document.getElementById("aTitle").textContent=a.title;
  var c=document.getElementById("aContent"); c.innerHTML="";

  // special widget: budget for finanzen
  if(a.key==="finanzen"){
    var v=Number(state.bVal)||0, thr=Number(state.bThr)||0;
    var cls=v<=0?"--red":(v<thr?"--amber":"--green");
    var p=document.createElement("div"); p.className="panel";
    p.innerHTML='<div class="plab"><span class="dot" style="--accent:var('+cls+');background:var('+cls+');box-shadow:0 0 12px var('+cls+')"></span>Budget</div>'+
      '<div class="bigval" style="color:var('+cls+')">'+fmtEur(v)+'</div>';
    c.appendChild(p);
  }
  if(a.key==="wissen"){
    var q=PROVERBS[doy(new Date())%PROVERBS.length];
    var p2=document.createElement("div"); p2.className="panel";
    p2.innerHTML='<div class="plab"><span class="dot" style="--accent:'+col+'"></span>Gedanke des Tages</div>'+
      '<div class="notes" style="font-style:italic">„'+escapeHtml(q)+'"</div>';
    c.appendChild(p2);
  }

  var pn=document.createElement("div"); pn.className="panel";
  pn.innerHTML='<div class="plab"><span class="dot" style="--accent:'+col+'"></span>Notizen</div>'+
    '<div class="notes">'+(a.notes&&a.notes.trim()?escapeHtml(a.notes):'<span class="muted">Noch leer — über ⚙ befüllen.</span>')+'</div>'+
    '<div class="obnote">⟳ Wird später automatisch aus deiner Obsidian-Notiz für „'+escapeHtml(a.title)+'" gelesen.</div>';
  c.appendChild(pn);

  document.getElementById("hub").classList.remove("active");
  var v2=document.getElementById("area"); v2.classList.add("active","fadein"); setTimeout(function(){v2.classList.remove("fadein");},400);
}
function fmtEur(v){try{return new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(v);}catch(e){return "€"+Math.round(v);}}

/* weather */
var WMO={0:["☀️","Klar"],1:["🌤️","Heiter"],2:["⛅","Wolkig"],3:["☁️","Bedeckt"],45:["🌫️","Nebel"],48:["🌫️","Nebel"],51:["🌦️","Niesel"],53:["🌦️","Niesel"],55:["🌦️","Niesel"],61:["🌧️","Regen"],63:["🌧️","Regen"],65:["🌧️","Starkregen"],71:["🌨️","Schnee"],73:["🌨️","Schnee"],75:["❄️","Schnee"],80:["🌦️","Schauer"],81:["🌦️","Schauer"],82:["⛈️","Schauer"],95:["⛈️","Gewitter"],96:["⛈️","Gewitter"],99:["⛈️","Gewitter"]};
function tcol(t){if(t<0)return"#7cc0ff";if(t<5)return"var(--blue)";if(t<12)return"#4fb6c5";if(t<20)return"var(--green)";if(t<27)return"var(--amber)";return"var(--red)";}
function fetchWeather(){
  var u="https://api.open-meteo.com/v1/forecast?latitude="+state.lat+"&longitude="+state.lon+"&current=temperature_2m,weather_code,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=1";
  fetch(u).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){
    document.getElementById("offline").style.display="none";
    var w=WMO[d.current.weather_code]||["🌡️","—"]; var t=Math.round(d.current.temperature_2m);
    document.getElementById("wxIc").textContent=w[0];
    var tp=document.getElementById("wxTp"); tp.textContent=t+"°"; tp.style.color=tcol(t);
    document.getElementById("wxCond").textContent=w[1];
    var hi=Math.round(d.daily.temperature_2m_max[0]),lo=Math.round(d.daily.temperature_2m_min[0]);
    var pp=d.daily.precipitation_probability_max?d.daily.precipitation_probability_max[0]:null;
    var sub=state.city+" · "+hi+"°/"+lo+"°"+(lo<=3?"  ❄️ Frost":"")+(pp!=null&&pp>=60?("  ☔"+pp+"%"):"");
    document.getElementById("wxSub").textContent=sub;
  }).catch(function(){document.getElementById("wxCond").textContent="offline";document.getElementById("offline").style.display="block";});
}

/* editor */
var editArea=0;
function openEditor(){
  document.getElementById("e_city").value=state.city;
  document.getElementById("e_lat").value=state.lat;
  document.getElementById("e_lon").value=state.lon;
  document.getElementById("e_bVal").value=state.bVal;
  document.getElementById("e_bThr").value=state.bThr;
  buildAreaTabs(); loadAreaFields(editArea); renderEvList();
  document.getElementById("scrim").classList.add("open");
}
function closeEditor(){document.getElementById("scrim").classList.remove("open");}
function buildAreaTabs(){
  var tb=document.getElementById("areaTabs"); tb.innerHTML="";
  state.areas.forEach(function(a,i){
    var b=document.createElement("div"); b.className="tb"+(i===editArea?" on":""); b.textContent=a.icon+" "+a.title;
    b.onclick=function(){ stashAreaFields(); editArea=i; buildAreaTabs(); loadAreaFields(i); };
    tb.appendChild(b);
  });
}
function loadAreaFields(i){var a=state.areas[i];
  document.getElementById("e_aIcon").value=a.icon;
  document.getElementById("e_aTitle").value=a.title;
  document.getElementById("e_aTeaser").value=a.teaser||"";
  document.getElementById("e_aNotes").value=a.notes||"";
}
function stashAreaFields(){var a=state.areas[editArea];
  a.icon=document.getElementById("e_aIcon").value||a.icon;
  a.title=document.getElementById("e_aTitle").value||a.title;
  a.teaser=document.getElementById("e_aTeaser").value;
  a.notes=document.getElementById("e_aNotes").value;
}
function renderEvList(){
  var box=document.getElementById("e_evlist"); box.innerHTML="";
  var list=(state.events||[]).slice().sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});
  if(!list.length){box.innerHTML='<div class="evrow" style="color:var(--low)">Keine Termine.</div>';return;}
  list.forEach(function(e){
    var r=document.createElement("div"); r.className="evrow";
    var d=document.createElement("span"); d.className="ed"; d.textContent=(e.date||"")+" "+(e.time||"");
    var t=document.createElement("span"); t.className="et"; t.textContent=e.title||"";
    var x=document.createElement("button"); x.className="btn danger mini"; x.textContent="✕";
    x.onclick=function(){state.events=state.events.filter(function(z){return z!==e;});renderEvList();};
    r.appendChild(d);r.appendChild(t);r.appendChild(x);box.appendChild(r);
  });
}
function addEvent(){
  var d=document.getElementById("e_evDate").value,t=document.getElementById("e_evTime").value,ti=document.getElementById("e_evTitle").value.trim();
  if(!d||!ti)return; state.events.push({date:d,time:t||"",title:ti});
  document.getElementById("e_evTitle").value=""; renderEvList();
}
function saveAll(){
  stashAreaFields();
  state.city=document.getElementById("e_city").value.trim()||"Essen";
  state.lat=parseFloat(document.getElementById("e_lat").value)||state.lat;
  state.lon=parseFloat(document.getElementById("e_lon").value)||state.lon;
  state.bVal=parseFloat(document.getElementById("e_bVal").value)||0;
  state.bThr=parseFloat(document.getElementById("e_bThr").value)||0;
  save(); renderAll(); fetchWeather(); closeEditor();
}

document.getElementById("gear").onclick=openEditor;
document.getElementById("e_close").onclick=closeEditor;
document.getElementById("e_save").onclick=saveAll;
document.getElementById("e_evAdd").onclick=addEvent;
document.getElementById("back").onclick=showHub;
document.getElementById("scrim").onclick=function(e){if(e.target===this)closeEditor();};

function renderAll(){renderClock();renderAgenda();renderGrid();}
renderAll(); fetchWeather();
setInterval(renderClock,1000);
setInterval(function(){renderAgenda();},60000);
setInterval(fetchWeather,30*60*1000);
</script>
</body>
</html>
